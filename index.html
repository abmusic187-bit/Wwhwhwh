<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login & Register</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; shadow: 0 4px 10px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        
        /* Puzzle Styles */
        .puzzle-container { margin-top: 20px; padding: 10px; border-top: 1px solid #eee; }
        .shape-grid { display: flex; justify-content: space-around; margin-top: 10px; }
        .shape-btn { width: 60px; height: 60px; cursor: pointer; border: 2px solid transparent; border-radius: 8px; transition: 0.2s; background: #f8f9fa; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #555; }
        .shape-btn:hover { border-color: #007bff; background: #e9ecef; }
        .shape-btn.selected { border-color: #28a745; background: #d4edda; }
        .target-text { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">Create Account</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <div class="puzzle-container">
        <p>Verification: Click the <span id="target-name" class="target-text">...</span></p>
        <div class="shape-grid" id="shape-grid">
            </div>
    </div>

    <button onclick="handleSubmit()" id="submit-btn" style="margin-top: 20px;">Register</button>
    <p style="font-size: 12px; cursor: pointer; color: #666;" onclick="toggleMode()">Switch to Login</p>
</div>

<script>
    let currentMode = 'register';
    let targetShape = '';
    let selectedShape = '';
    const API_URL = 'https://your-render-app-name.onrender.com'; // Replace with your Render URL

    async function loadPuzzle() {
        try {
            const res = await fetch(`${API_URL}/api/puzzle`);
            const data = await res.json();
            targetShape = data.target;
            document.getElementById('target-name').innerText = targetShape;
            
            const grid = document.getElementById('shape-grid');
            grid.innerHTML = '';
            data.allShapes.forEach(shape => {
                const btn = document.createElement('div');
                btn.className = 'shape-btn';
                btn.innerText = shape;
                btn.onclick = () => {
                    selectedShape = shape;
                    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                };
                grid.appendChild(btn);
            });
        } catch (e) { console.error("Could not load puzzle. Is server awake?"); }
    }

    function toggleMode() {
        currentMode = currentMode === 'register' ? 'login' : 'register';
        document.getElementById('title').innerText = currentMode === 'register' ? 'Create Account' : 'Welcome Back';
        document.getElementById('submit-btn').innerText = currentMode === 'register' ? 'Register' : 'Login';
    }

    async function handleSubmit() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (!selectedShape) return alert("Please complete the visual puzzle!");

        const endpoint = currentMode === 'register' ? '/api/register' : '/api/login';
        
        const response = await fetch(API_URL + endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, selectedShape, targetShape })
        });

        const result = await response.json();
        alert(result.message);
        
        if (response.ok) {
            // Reset puzzle after success
            selectedShape = '';
            loadPuzzle();
        }
    }

    // Initial Load
    loadPuzzle();
</script>

</body>
</html>
